# SPEC-010 — full local stack: PostgreSQL + API + Nginx (SPA)
# Prerequisites: sapcyti-api and sapcyti-spa cloned as sibling directories (../../)
# Setup: copy ../../sapcyti-api/.env.docker.example to .env here

services:
  db:
    image: postgres:16-alpine
    container_name: sapcyti-stack-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sapcyti_dev}
      POSTGRES_USER: ${POSTGRES_USER:-sapcyti}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sapcyti_dev_pass}
    volumes:
      - sapcyti-db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-sapcyti} -d ${POSTGRES_DB:-sapcyti_dev}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ../../sapcyti-api
    container_name: sapcyti-stack-api
    restart: unless-stopped
    env_file: .env
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy

  edge:
    build:
      context: ../../sapcyti-spa
      dockerfile: Dockerfile
    container_name: sapcyti-stack-edge
    restart: unless-stopped
    ports:
      - "${EDGE_HTTP_PORT:-80}:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  sapcyti-db-data:
    name: sapcyti-db-data
