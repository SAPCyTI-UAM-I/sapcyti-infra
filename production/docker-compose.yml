# SPEC-010 — Production full stack: PostgreSQL + API + Nginx (SPA)
# Setup: copy .env.prod.example to .env.prod

services:
  db:
    image: postgres:16-alpine
    container_name: sapcyti-prod-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sapcyti_prod}
      POSTGRES_USER: ${POSTGRES_USER:-sapcyti}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-sapcyti_prod_pass}
    volumes:
      - sapcyti-prod-db-data:/var/lib/postgresql/data
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-sapcyti} -d ${POSTGRES_DB:-sapcyti_prod}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${API_IMAGE:-ghcr.io/gabbo0709/sapcyti-api:latest}
    container_name: sapcyti-prod-api
    restart: unless-stopped
    env_file: .env.prod
    ports:
      - "${SERVER_PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy

  edge:
    image: ${SPA_IMAGE:-ghcr.io/gabbo0709/sapcyti-spa:latest}
    container_name: sapcyti-prod-edge
    restart: unless-stopped
    ports:
      - "${EDGE_HTTP_PORT:-80}:80"
    volumes:
      - ./default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  sapcyti-prod-db-data:
    name: sapcyti-prod-db-data
