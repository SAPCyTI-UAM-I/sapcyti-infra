# SAPCyTI per-environment stack: PostgreSQL + API + SPA edge.
# Env-agnostic: ENV_NAME/IMAGE/PORT come from the .env generated by env_build.sh.
# The edge is NOT published publicly — only the global nginx proxy (on proxy-net,
# :80) routes traffic by hostname. EDGE_HTTP_PORT is bound to loopback only, for
# on-server debugging (curl localhost:PORT), never reachable as domain:port.

services:
  db:
    image: postgres:16-alpine
    container_name: sapcyti-${ENV_NAME}-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sapcyti_db}
      POSTGRES_USER: ${POSTGRES_USER:-sapcyti}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - internal-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-sapcyti} -d ${POSTGRES_DB:-sapcyti_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${API_IMAGE}
    container_name: sapcyti-${ENV_NAME}-api
    restart: unless-stopped
    env_file: .env
    networks:
      - internal-net
    depends_on:
      db:
        condition: service_healthy

  edge:
    image: ${SPA_IMAGE}
    container_name: sapcyti-${ENV_NAME}-edge
    restart: unless-stopped
    ports:
      - "127.0.0.1:${EDGE_HTTP_PORT}:80"
    environment:
      - API_URL=${API_URL:-api:8080}
    networks:
      - internal-net
      - proxy-net
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  db-data:
    name: sapcyti-${ENV_NAME}-db-data

networks:
  internal-net:
    driver: bridge
  proxy-net:
    external: true
