# SPEC-010 — Production full stack: PostgreSQL + API + Nginx (SPA)
# Setup: copy .env.prod.example to .env.prod

services:
  db:
    image: postgres:16-alpine
    container_name: sapcyti-${ENV_NAME}-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-sapcyti_db}
      POSTGRES_USER: ${POSTGRES_USER:-sapcyti}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - sapcyti-${ENV_NAME}-db-data:/var/lib/postgresql/data
    networks:
      - internal-net
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-sapcyti} -d ${POSTGRES_DB:-sapcyti_db}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    image: ${API_IMAGE}
    container_name: sapcyti-${ENV_NAME}-api
    restart: unless-stopped
    env_file: .env
    networks:
      - internal-net
    depends_on:
      db:
        condition: service_healthy

  edge:
    image: ${SPA_IMAGE}
    container_name: sapcyti-${ENV_NAME}-edge
    restart: unless-stopped
    ports:
      - "${EDGE_HTTP_PORT}:80"
    environment:
      - API_URL=${API_URL:-http://api:8080}
    networks:
      - internal-net
      - proxy-net
    depends_on:
      api:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  sapcyti-${ENV_NAME}-db-data:
    name: sapcyti-${ENV_NAME}-db-data

networks:
  internal-net:
    driver: bridge
  proxy-net:
    external: true