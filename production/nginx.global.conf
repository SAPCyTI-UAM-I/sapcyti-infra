# SAPCyTI edge router — single public entry (:80), routes by hostname to each
# environment's SPA edge over the shared proxy-net. Upstreams are container
# names resolved at request time via Docker's embedded DNS, so this proxy
# survives an env edge being down or recreated (no boot failure, no stale IP).
resolver 127.0.0.11 valid=10s ipv6=off;

# Dev
server {
    listen 80;
    server_name dev-sapcyti.duckdns.org;

    location / {
        set $edge http://sapcyti-dev-edge:80;
        proxy_pass $edge;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

